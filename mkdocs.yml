site_name: Plexus
site_url: https://plexuslabs.dev
site_description: Open protocol for AI and algorithmic trading strategies — high-frequency trading (HFT), order-flow analysis, and machine-learning automation across futures, CFD, FX and crypto markets.
copyright: >
  © 2026 Plexus Trading Labs ·
  <a href="https://github.com/PlexusTradingLabs">GitHub</a> ·
  <a href="https://plexustraders.com">Plexus Traders ↗</a>

theme:
  name: material
  custom_dir: overrides
  logo: assets/octopus-mark.svg
  favicon: assets/octopus-mark.svg
  palette:
    scheme: slate
    primary: black
    accent: light blue
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/PlexusTradingLabs
      name: Plexus on GitHub
    - icon: material/rocket-launch
      link: https://plexustraders.com
      name: Plexus Traders

nav:
  - Home: index.md
  - Overview:
      - Architecture: overview/architecture.md
  - Protocol:
      - The Plexus Bus: protocol/index.md
  - PrismR:
      - Write a plugin: prismr/plugins.md
  - Connect:
      - Trade clients: connect/index.md
  - Community: community.md
