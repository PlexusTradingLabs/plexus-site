site_name: Plexus
site_url: https://plexuslabs.dev
site_description: An open protocol for AI trading strategies — distributed intelligence for the futures market.
copyright: © 2026 Plexus Trading Labs

theme:
  name: material
  logo: assets/plexus-mark.svg
  favicon: assets/plexus-mark.svg
  palette:
    scheme: slate
    primary: black
    accent: light blue
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/PlexusTradingLabs

nav:
  - Home: index.md
  - Overview:
      - Architecture: overview/architecture.md
  - Protocol:
      - The Plexus Bus: protocol/index.md
  - PrismR:
      - Write a plugin: prismr/plugins.md
  - Community: community.md
