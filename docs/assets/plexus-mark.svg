<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Plexus">
  <!-- Plexus mark: hexagonal PRISM core + 6 spokes (connected units) + Rust-red core -->
  <g stroke-width="5" stroke-linecap="round">
    <line x1="96" y1="50"   x2="76" y2="50"   stroke="#3fb96b"/>
    <line x1="73" y1="89.8" x2="63" y2="72.5" stroke="#3fb96b"/>
    <line x1="27" y1="89.8" x2="37" y2="72.5" stroke="#3fb96b"/>
    <line x1="4"  y1="50"   x2="24" y2="50"   stroke="#4a90e2"/>
    <line x1="27" y1="10.2" x2="37" y2="27.5" stroke="#4a90e2"/>
    <line x1="73" y1="10.2" x2="63" y2="27.5" stroke="#4a90e2"/>
  </g>
  <polygon points="96,50 73,89.8 27,89.8 4,50 27,10.2 73,10.2"
           fill="none" stroke="#e8eefc" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="76,50 63,72.5 37,72.5 24,50 37,27.5 63,27.5"
           fill="none" stroke="#3a4659" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="50" cy="50" r="9" fill="#e0492b" stroke="#0f1423" stroke-width="1.5"/>
</svg>
